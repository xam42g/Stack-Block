<script id="ga-mobile-patch-script">
(function () {
  const CONTROL_MODE_KEY = "ga_control_mode_v1";
  let controlMode = localStorage.getItem(CONTROL_MODE_KEY) || "";
  let virtualStick = { x: 0, y: 0, active: false, id: null };
  let joystickWrap, joystickBase, joystickKnob, touchAbilities;
  let modeKeyboardBtn, modeJoystickBtn;
  let shieldTouchBtn, teleportTouchBtn, speedTouchBtn, dashTouchBtn;

  function preventTouchScroll() {
    document.addEventListener("touchmove", function (e) {
      e.preventDefault();
    }, { passive: false });

    document.addEventListener("gesturestart", function (e) {
      e.preventDefault();
    }, { passive: false });

    document.addEventListener("dblclick", function (e) {
      e.preventDefault();
    }, { passive: false });
  }

  function buildControlModeMenu() {
    const menuCard = document.querySelector("#menuOverlay .card");
    if (!menuCard || document.getElementById("controlModeBlock")) return;

    const block = document.createElement("div");
    block.id = "controlModeBlock";
    block.innerHTML = `
      <div class="sectionLabel" style="margin-top:4px;">Control</div>
      <div class="modeRow">
        <button id="modeKeyboardBtn" class="secondary modeBtn" type="button">Keyboard</button>
        <button id="modeJoystickBtn" class="secondary modeBtn" type="button">Joystick</button>
      </div>
    `;

    const nameInputEl = document.getElementById("nameInput");
    if (nameInputEl && nameInputEl.parentNode) {
      nameInputEl.parentNode.insertBefore(block, document.getElementById("startBtn"));
    } else {
      menuCard.appendChild(block);
    }

    modeKeyboardBtn = document.getElementById("modeKeyboardBtn");
    modeJoystickBtn = document.getElementById("modeJoystickBtn");

    modeKeyboardBtn.addEventListener("click", function () {
      controlMode = "keyboard";
      localStorage.setItem(CONTROL_MODE_KEY, controlMode);
      refreshModeButtons();
      refreshStartAvailability();
      updateTouchUiVisibility();
    });

    modeJoystickBtn.addEventListener("click", function () {
      controlMode = "joystick";
      localStorage.setItem(CONTROL_MODE_KEY, controlMode);
      refreshModeButtons();
      refreshStartAvailability();
      updateTouchUiVisibility();
    });

    refreshModeButtons();
    refreshStartAvailability();
  }

  function refreshModeButtons() {
    if (modeKeyboardBtn) {
      modeKeyboardBtn.classList.toggle("active", controlMode === "keyboard");
    }
    if (modeJoystickBtn) {
      modeJoystickBtn.classList.toggle("active", controlMode === "joystick");
    }
  }

  function hasPlayableName() {
    if (save && save.playerName && String(save.playerName).trim()) return true;
    return !!(nameInput && nameInput.value.trim());
  }

  function refreshStartAvailability() {
    if (!startBtn) return;
    startBtn.disabled = !(hasPlayableName() && !!controlMode);
  }

  function buildTouchControls() {
    const app = document.getElementById("app");
    if (!app || document.getElementById("touchAbilities")) return;

    touchAbilities = document.createElement("div");
    touchAbilities.id = "touchAbilities";
    touchAbilities.innerHTML = `
      <button id="dashTouchBtn" class="touchAbilityBtn" type="button">Dash (Space)</button>
      <button id="shieldTouchBtn" class="touchAbilityBtn" type="button">Shield (Q)</button>
      <button id="teleportTouchBtn" class="touchAbilityBtn" type="button">Teleport (E)</button>
      <button id="speedTouchBtn" class="touchAbilityBtn" type="button">Speed (Shift)</button>
    `;

    joystickWrap = document.createElement("div");
    joystickWrap.id = "joystickWrap";
    joystickWrap.innerHTML = `
      <div id="joystickBase"></div>
      <div id="joystickKnob"></div>
    `;

    app.appendChild(touchAbilities);
    app.appendChild(joystickWrap);

    joystickBase = document.getElementById("joystickBase");
    joystickKnob = document.getElementById("joystickKnob");
    dashTouchBtn = document.getElementById("dashTouchBtn");
    shieldTouchBtn = document.getElementById("shieldTouchBtn");
    teleportTouchBtn = document.getElementById("teleportTouchBtn");
    speedTouchBtn = document.getElementById("speedTouchBtn");

    const activate = (fn) => (ev) => {
      ev.preventDefault();
      ev.stopPropagation();
      fn();
    };

    dashTouchBtn.addEventListener("click", activate(useDash));
    shieldTouchBtn.addEventListener("click", activate(useShield));
    teleportTouchBtn.addEventListener("click", activate(useTeleport));
    speedTouchBtn.addEventListener("click", activate(useSpeed));

    dashTouchBtn.addEventListener("touchstart", activate(useDash), { passive: false });
    shieldTouchBtn.addEventListener("touchstart", activate(useShield), { passive: false });
    teleportTouchBtn.addEventListener("touchstart", activate(useTeleport), { passive: false });
    speedTouchBtn.addEventListener("touchstart", activate(useSpeed), { passive: false });

    joystickWrap.addEventListener("touchstart", joystickStart, { passive: false });
    joystickWrap.addEventListener("touchmove", joystickMove, { passive: false });
    joystickWrap.addEventListener("touchend", joystickEnd, { passive: false });
    joystickWrap.addEventListener("touchcancel", joystickEnd, { passive: false });
  }

  function updateTouchUiVisibility() {
    const inGame = state === "play";
    if (touchAbilities) touchAbilities.style.display = inGame ? "flex" : "none";
    if (joystickWrap) joystickWrap.style.display = (controlMode === "joystick" && inGame) ? "block" : "none";
  }

  function joystickStart(e) {
    if (controlMode !== "joystick" || state !== "play") return;
    const touch = e.changedTouches[0];
    virtualStick.id = touch.identifier;
    virtualStick.active = true;
    joystickMoveFromTouch(touch);
    e.preventDefault();
  }

  function joystickMove(e) {
    if (!virtualStick.active) return;
    for (const touch of e.changedTouches) {
      if (touch.identifier === virtualStick.id) {
        joystickMoveFromTouch(touch);
        break;
      }
    }
    e.preventDefault();
  }

  function joystickEnd(e) {
    for (const touch of e.changedTouches) {
      if (touch.identifier === virtualStick.id) {
        virtualStick.active = false;
        virtualStick.id = null;
        virtualStick.x = 0;
        virtualStick.y = 0;
        updateJoystickKnob();
        break;
      }
    }
    e.preventDefault();
  }

  function joystickMoveFromTouch(touch) {
    const rect = joystickWrap.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const dx = touch.clientX - cx;
    const dy = touch.clientY - cy;
    const maxR = rect.width * 0.42;
    const len = Math.hypot(dx, dy) || 1;
    const clamped = Math.min(maxR, len);

    virtualStick.x = (dx / len) * (clamped / maxR);
    virtualStick.y = (dy / len) * (clamped / maxR);
    updateJoystickKnob();
  }

  function updateJoystickKnob() {
    if (!joystickKnob || !joystickWrap) return;
    const base = joystickWrap.clientWidth;
    const knob = joystickKnob.clientWidth;
    const center = (base - knob) / 2;
    const max = base * 0.34;
    joystickKnob.style.left = (center + virtualStick.x * max) + "px";
    joystickKnob.style.top = (center + virtualStick.y * max) + "px";
  }

  function useDash() {
    if (controlMode !== "joystick" || state !== "play") return;
    tryDash();
  }

  function useShield() {
    if (controlMode !== "joystick" || state !== "play") return;
    if (!save.ownedAbilities || !save.ownedAbilities.shield) return;
    if (abilityState.shieldCooldown > 0) return;
    player.invuln = Math.max(player.invuln, 3.05);
    abilityState.shieldActive = 3.0;
    abilityState.shieldCooldown = 18.0;
    updateAbilityUI();
  }

  function useTeleport() {
    if (controlMode !== "joystick" || state !== "play") return;
    if (!save.ownedAbilities || !save.ownedAbilities.teleport) return;
    if (abilityState.teleportCooldown > 0) return;
    const pos = randomFreeCircle(player.r + 8);
    player.x = pos.x;
    player.y = pos.y;
    abilityState.teleportCooldown = 10.0;
    for (let i = 0; i < 12; i++) {
      particles.push(makeParticle(player.x, player.y, "#b48cff", 220));
    }
    updateAbilityUI();
  }

  function useSpeed() {
    if (controlMode !== "joystick" || state !== "play") return;
    if (!save.ownedAbilities || !save.ownedAbilities.speed) return;
    if (abilityState.speedCooldown > 0) return;
    abilityState.speedActive = 3.0;
    abilityState.speedCooldown = 14.0;
    updateAbilityUI();
  }

  function refreshTouchAbilityButtons() {
    if (!dashTouchBtn) return;
    shieldTouchBtn.disabled = !save.ownedAbilities.shield || abilityState.shieldCooldown > 0 || state !== "play";
    teleportTouchBtn.disabled = !save.ownedAbilities.teleport || abilityState.teleportCooldown > 0 || state !== "play";
    speedTouchBtn.disabled = !save.ownedAbilities.speed || abilityState.speedCooldown > 0 || state !== "play";
    dashTouchBtn.disabled = (player && player.dashCooldown > 0) || state !== "play";
  }

  function findSafeCenterSpawn() {
    const base = { x: GAME.w / 2, y: GAME.h / 2, r: player.r };
    if (!wouldOverlapBlock(base) && !wouldOverlapEnemy(base)) {
      return { x: base.x, y: base.y };
    }

    let best = null;
    let bestScore = -Infinity;
    for (let ring = 0; ring <= 12; ring++) {
      const radius = ring * 18;
      for (let a = 0; a < 24; a++) {
        const angle = (Math.PI * 2 * a) / 24;
        const x = GAME.w / 2 + Math.cos(angle) * radius;
        const y = GAME.h / 2 + Math.sin(angle) * radius;
        const probe = { x, y, r: player.r };
        if (x < player.r || x > GAME.w - player.r || y < player.r || y > GAME.h - player.r) continue;
        if (wouldOverlapBlock(probe) || wouldOverlapEnemy(probe)) continue;
        const score = -Math.hypot(x - GAME.w / 2, y - GAME.h / 2);
        if (score > bestScore) {
          bestScore = score;
          best = { x, y };
        }
      }
      if (best) return best;
    }
    return { x: GAME.w / 2, y: GAME.h / 2 };
  }

  function wouldOverlapBlock(circle) {
    for (const b of blocks) {
      if (circleRectOverlap(circle, b)) return true;
    }
    return false;
  }

  function wouldOverlapEnemy(circle) {
    for (const e of enemies) {
      const dx = circle.x - e.x;
      const dy = circle.y - e.y;
      const rr = circle.r + e.r + 24;
      if (dx * dx + dy * dy < rr * rr) return true;
    }
    return false;
  }

  function findSafestTeleportSpot(r) {
    let best = null;
    let bestScore = -Infinity;
    const margin = r + 8;
    const cols = 18;
    const rows = 10;

    for (let gy = 0; gy <= rows; gy++) {
      for (let gx = 0; gx <= cols; gx++) {
        const x = margin + (gx / cols) * (GAME.w - margin * 2);
        const y = margin + (gy / rows) * (GAME.h - margin * 2);
        const probe = { x, y, r };
        if (wouldOverlapBlock(probe)) continue;

        let nearestEnemy = Infinity;
        for (const e of enemies) {
          const d = Math.hypot(x - e.x, y - e.y) - e.r - r;
          if (d < nearestEnemy) nearestEnemy = d;
        }

        const wallSpace = Math.min(x - r, y - r, GAME.w - x - r, GAME.h - y - r);

        let blockSpace = Infinity;
        for (const b of blocks) {
          const cx = Math.max(b.x, Math.min(x, b.x + b.w));
          const cy = Math.max(b.y, Math.min(y, b.y + b.h));
          const d = Math.hypot(x - cx, y - cy) - r;
          if (d < blockSpace) blockSpace = d;
        }

        const centerBias = -Math.hypot(x - GAME.w / 2, y - GAME.h / 2) * 0.05;
        const score = nearestEnemy * 1.5 + wallSpace * 0.45 + blockSpace * 0.7 + centerBias;
        if (score > bestScore) {
          bestScore = score;
          best = { x, y };
        }
      }
    }

    if (best) return best;
    return { x: GAME.w / 2, y: GAME.h / 2 };
  }

  const originalRandomFreeCircle = randomFreeCircle;
  randomFreeCircle = function (r) {
    if (Math.abs(r - (GAME.playerRadius + 8)) < 0.01 && state === "play") {
      return findSafestTeleportSpot(r);
    }
    return originalRandomFreeCircle(r);
  };

  const originalResetRunForCenter = resetRun;
  resetRun = function () {
    originalResetRunForCenter.apply(this, arguments);
    const pos = findSafeCenterSpawn();
    player.x = pos.x;
    player.y = pos.y;
    updateHud();
  };

  const originalUpdateWithTouch = update;
  update = function (dt) {
    if (controlMode === "joystick" && state === "play") {
      updateStarfield(dt);

      if (player.invuln > 0) player.invuln -= dt;
      if (player.dashCooldown > 0) player.dashCooldown -= dt;
      if (player.dashTime > 0) player.dashTime -= dt;
      if (screenFlash > 0) screenFlash -= dt;

      const deadZone = 0.06;
      let jx = virtualStick.x;
      let jy = virtualStick.y;

      const mag = Math.hypot(jx, jy);
      if (mag < deadZone) {
        jx = 0;
        jy = 0;
      } else {
        const scaled = Math.min(1, (mag - deadZone) / (1 - deadZone));
        jx = (jx / mag) * scaled;
        jy = (jy / mag) * scaled;
      }

      if (player.dashTime > 0) {
        movePlayerAxis(player.dashDx * GAME.dashSpeed * dt, player.dashDy * GAME.dashSpeed * dt);
      } else if (jx !== 0 || jy !== 0) {
        movePlayerAxis(jx * player.speed * dt, jy * player.speed * dt);
      }

      enemyTimer += dt;
      coinTimer += dt;
      score += 16 * dt;

      if (enemyTimer >= GAME.enemySpawnSeconds) {
        enemyTimer = 0;
        spawnEnemy();
      }
      if (coinTimer >= GAME.coinSpawnSeconds) {
        coinTimer = 0;
        spawnCoin();
      }

      for (const enemy of enemies) {
        updateEnemy(enemy, dt);
        if (circleHit(player, enemy)) takeHit();
      }

      for (let i = coins.length - 1; i >= 0; i--) {
        coins[i].pulse += dt * 3.0;
        if (circleHit(player, coins[i])) {
          runCoins += 1;
          score += 60;
          for (let p = 0; p < 10; p++) {
            particles.push(makeParticle(coins[i].x, coins[i].y, "#ffd85a", 140));
          }
          coins.splice(i, 1);
        }
      }

      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.life -= dt;
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vx *= 0.985;
        p.vy *= 0.985;
        if (p.life <= 0) particles.splice(i, 1);
      }

      if (abilityState.shieldCooldown > 0) abilityState.shieldCooldown = Math.max(0, abilityState.shieldCooldown - dt);
      if (abilityState.shieldActive > 0) abilityState.shieldActive = Math.max(0, abilityState.shieldActive - dt);
      if (abilityState.teleportCooldown > 0) abilityState.teleportCooldown = Math.max(0, abilityState.teleportCooldown - dt);
      if (abilityState.speedCooldown > 0) abilityState.speedCooldown = Math.max(0, abilityState.speedCooldown - dt);
      if (abilityState.speedActive > 0) abilityState.speedActive = Math.max(0, abilityState.speedActive - dt);

      updateHud();
    } else {
      originalUpdateWithTouch(dt);
    }
    refreshTouchAbilityButtons();
    updateTouchUiVisibility();
  };

  const originalStartGameWithMode = startGame;
  startGame = function () {
    if (!hasPlayableName() || !controlMode) return;
    originalStartGameWithMode.apply(this, arguments);
    updateTouchUiVisibility();
  };

  const originalShowMenuWithMode = showMenu;
  showMenu = function () {
    originalShowMenuWithMode.apply(this, arguments);
    updateTouchUiVisibility();
    refreshStartAvailability();
    refreshModeButtons();
  };

  if (nameInput) {
    nameInput.addEventListener("input", refreshStartAvailability);
  }

  preventTouchScroll();
  buildControlModeMenu();
  buildTouchControls();
  refreshStartAvailability();
  refreshModeButtons();
  updateTouchUiVisibility();
  refreshTouchAbilityButtons();
})();
</script>

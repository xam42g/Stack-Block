<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Stack77</title>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#6fc5f0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;touch-action:none}
canvas{display:block;width:100vw;height:100vh}
</style></head><body><canvas id="c"></canvas><script>
const c=document.getElementById("c"),x=c.getContext("2d");let W=0,H=0,D=1;
function resize(){D=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;c.width=W*D;c.height=H*D;x.setTransform(D,0,0,D,0,0)}addEventListener("resize",resize);resize();
const colors=["#ffcf35","#1d87e4","#8e44d8","#ff9f1c","#2bb6aa","#53b45f","#ef5350","#d977b0"];
const ms=[
{name:"House",h:"10 m",b:5,t:"house",d:"A cozy little home."},{name:"Church",h:"30 m",b:10,t:"church",d:"An old village church."},{name:"Big Ben",h:"96 m",b:17,t:"bigben",d:"The famous clock tower."},{name:"Cologne Cathedral",h:"157 m",b:25,t:"cathedral",d:"A huge gothic cathedral."},
{name:"Eiffel Tower",h:"330 m",b:34,t:"eiffel",d:"Paris in tower form."},{name:"Skyscraper",h:"400 m",b:42,t:"skyscraper",d:"Above the skyline."},{name:"Airplane",h:"500 m",b:50,t:"airplane",d:"High enough for aircraft."},{name:"Burj Khalifa",h:"828 m",b:58,t:"burj",d:"The tallest landmark."}
];
let S={blocks:[],moving:null,dir:1,axis:"x",score:0,best:+localStorage.stack77best||0,combo:0,cam:0,dead:false,book:false,bookA:0,page:0,next:0,flip:0,flipDir:1,stars:[]};
function iso(px,py,pz){let sc=1;return{x:W/2+(px-py)*0.72*sc,y:H*.66+(px+py)*0.36*sc-pz*1.1-S.cam}}
function block(x0,y0,w,d,z,h,col){this.x=x0;this.y=y0;this.w=w;this.d=d;this.z=z;this.h=h;this.c=col}
function reset(){S.blocks=[new block(0,0,180,180,0,32,colors[1])];S.moving=new block(-260,0,180,180,32,32,colors[0]);S.dir=1;S.axis="x";S.score=0;S.combo=0;S.dead=false;S.cam=0;S.stars=[]}
function addMoving(){let top=S.blocks[S.blocks.length-1],z=top.z+top.h,col=colors[S.blocks.length%colors.length];S.axis=S.blocks.length%2?"x":"y";S.dir=1;S.moving=new block(S.axis=="x"?-300:top.x,S.axis=="y"?-300:top.y,top.w,top.d,z,32,col)}
function starburst(px,py){for(let i=0;i<24;i++)S.stars.push({x:px,y:py,vx:(Math.random()-.5)*8,vy:(Math.random()-.8)*8,a:1,s:4+Math.random()*4})}
function place(){if(S.book)return;if(S.dead){reset();return}let m=S.moving,t=S.blocks[S.blocks.length-1],ax=S.axis,delta=(ax=="x"?m.x-t.x:m.y-t.y),over=(ax=="x"?m.w:m.d)-Math.abs(delta);if(over<=0){S.dead=true;return}
let perfect=Math.abs(delta)<7;if(ax=="x"){m.w=over;m.x=t.x+delta/2}else{m.d=over;m.y=t.y+delta/2}
S.blocks.push(m);S.score+=perfect?2+S.combo:1;S.combo=perfect?S.combo+1:0;if(perfect){let p=iso(m.x+m.w/2,m.y+m.d/2,m.z+m.h);starburst(p.x,p.y)}
S.best=Math.max(S.best,S.score);localStorage.stack77best=S.best;addMoving()}
function update(){if(!S.dead&&S.moving){let v=3+Math.min(5,S.score*.03);if(S.axis=="x")S.moving.x+=S.dir*v;else S.moving.y+=S.dir*v;let q=S.axis=="x"?S.moving.x:S.moving.y;if(q>300||q<-300)S.dir*=-1}
let top=S.blocks[S.blocks.length-1];let target=Math.max(0,(top.z-90));S.cam+=(target-S.cam)*.08;S.bookA+=(S.book?1:0-S.bookA)*.18;if(S.flip>0){S.flip=Math.max(0,S.flip-.018);if(S.flip<.5&&S.page!==S.next)S.page=S.next}
for(let st of S.stars){st.x+=st.vx;st.y+=st.vy;st.vy+=.25;st.a-=.025}S.stars=S.stars.filter(s=>s.a>0)}
function poly(ps,fill){x.fillStyle=fill;x.beginPath();x.moveTo(ps[0].x,ps[0].y);for(let i=1;i<ps.length;i++)x.lineTo(ps[i].x,ps[i].y);x.closePath();x.fill()}
function drawBlock(b){let p1=iso(b.x-b.w/2,b.y-b.d/2,b.z+b.h),p2=iso(b.x+b.w/2,b.y-b.d/2,b.z+b.h),p3=iso(b.x+b.w/2,b.y+b.d/2,b.z+b.h),p4=iso(b.x-b.w/2,b.y+b.d/2,b.z+b.h);
let q1=iso(b.x-b.w/2,b.y-b.d/2,b.z),q2=iso(b.x+b.w/2,b.y-b.d/2,b.z),q3=iso(b.x+b.w/2,b.y+b.d/2,b.z),q4=iso(b.x-b.w/2,b.y+b.d/2,b.z);
poly([p1,p2,p3,p4],b.c);poly([p4,p3,q3,q4],shade(b.c,-35));poly([p2,p3,q3,q2],shade(b.c,-55));x.strokeStyle="rgba(0,0,0,.15)";x.stroke()}
function shade(hex,n){let r=parseInt(hex.substr(1,2),16),g=parseInt(hex.substr(3,2),16),b=parseInt(hex.substr(5,2),16);return`rgb(${Math.max(0,r+n)},${Math.max(0,g+n)},${Math.max(0,b+n)})`}
function bg(){let g=x.createLinearGradient(0,0,0,H);g.addColorStop(0,"#49b9ef");g.addColorStop(.55,"#c5ecd8");g.addColorStop(1,"#ffe1a0");x.fillStyle=g;x.fillRect(0,0,W,H);x.fillStyle="rgba(255,255,255,.45)";for(let c of [[.12,.22,.09],[.9,.18,.12],[.08,.75,.13],[.92,.74,.13]]){x.beginPath();x.arc(W*c[0],H*c[1],W*c[2],0,7);x.fill()}}
function card(cx,lab,val,icon){x.save();x.shadowColor="rgba(0,0,0,.18)";x.shadowBlur=10;x.shadowOffsetY=4;rr(cx-55,22,110,78,20);x.fillStyle="rgba(255,255,255,.92)";x.fill();x.restore();x.textAlign="center";x.fillStyle="#25406b";x.font="bold 14px sans-serif";x.fillText(lab,cx,52);x.font="bold 34px sans-serif";x.fillText(val,cx,88);x.font="28px serif";x.fillText(icon,cx,28)}
function ui(){card(W/2-150,"BEST",S.best,"👑");card(W/2,"COMBO",S.combo,"🏆");card(W/2+150,"SCORE",S.score,"⭐");drawBookBtn()}
function drawBookBtn(){x.save();x.shadowColor="rgba(0,0,0,.25)";x.shadowBlur=10;rr(22,90,64,64,16);x.fillStyle="#248bea";x.fill();x.restore();x.font="37px serif";x.textAlign="center";x.fillText("📖",54,136)}
function rr(a,b,w,h,r){x.beginPath();x.moveTo(a+r,b);x.arcTo(a+w,b,a+w,b+h,r);x.arcTo(a+w,b+h,a,b+h,r);x.arcTo(a,b+h,a,b,r);x.arcTo(a,b,a+w,b,r);x.closePath()}
function picture(px,py,w,h,m,locked){x.save();rr(px,py,w,h,14);x.clip();let g=x.createLinearGradient(px,py,px,py+h);g.addColorStop(0,locked?"#665b4c":"#4ec2ff");g.addColorStop(.65,locked?"#403629":"#dff7ff");g.addColorStop(1,locked?"#2b241b":"#70c76f");x.fillStyle=g;x.fillRect(px,py,w,h);x.fillStyle="rgba(255,255,255,.55)";for(let c of [[.2,.22,.12],[.78,.19,.1]]){x.beginPath();x.arc(px+w*c[0],py+h*c[1],w*c[2],0,7);x.fill()}x.save();x.translate(px+w/2,py+h*.80);let S2=Math.min(w,h)/190;drawIcon(m.t,S2,locked);x.restore();if(locked){x.fillStyle="rgba(0,0,0,.62)";x.fillRect(px,py,w,h);x.fillStyle="#fff";x.font="46px sans-serif";x.textAlign="center";x.fillText("?",px+w/2,py+h/2)}x.restore()}
function drawIcon(t,s,l){x.scale(s,s);function R(a,b,w,h,c){x.fillStyle=c;x.fillRect(a,b,w,h);x.fillStyle="rgba(0,0,0,.16)";x.fillRect(a,b+h*.7,w,h*.3)}x.fillStyle="rgba(0,0,0,.15)";x.beginPath();x.ellipse(0,70,70,14,0,0,7);x.fill();
if(t=="house"){R(-52,-38,104,54,"#f7d76d");x.fillStyle="#ef5b52";x.beginPath();x.moveTo(-65,-38);x.lineTo(0,-94);x.lineTo(65,-38);x.fill();R(-14,-8,28,34,"#86532e");x.fillStyle="#7bc6ee";x.fillRect(-40,-24,24,20);x.fillRect(16,-24,24,20)}
else if(t=="church"){R(-52,-45,104,63,"#dfcfaa");R(-17,-108,34,63,"#c5b184");x.fillStyle="#a84e43";x.beginPath();x.moveTo(-24,-108);x.lineTo(0,-143);x.lineTo(24,-108);x.fill();x.fillStyle="#5c4b31";x.fillRect(-4,-166,8,24);x.fillRect(-17,-158,34,8);x.fillStyle="#76add6";x.beginPath();x.arc(0,-11,17,3.14,0);x.lineTo(17,18);x.lineTo(-17,18);x.fill()}
else if(t=="bigben"){R(-23,-155,46,175,"#c39850");x.fillStyle="#8d6331";x.beginPath();x.moveTo(-34,-155);x.lineTo(0,-200);x.lineTo(34,-155);x.fill();x.fillStyle="#f6e6a6";x.fillRect(-18,-138,36,34);x.fillStyle="#1d2b39";x.beginPath();x.arc(0,-121,13,0,7);x.fill()}
else if(t=="cathedral"){R(-70,-45,140,65,"#cdb68f");R(-75,-124,34,80,"#bca77f");R(41,-124,34,80,"#bca77f");x.fillStyle="#5c5042";x.beginPath();x.moveTo(-82,-124);x.lineTo(-58,-190);x.lineTo(-34,-124);x.fill();x.beginPath();x.moveTo(34,-124);x.lineTo(58,-190);x.lineTo(82,-124);x.fill()}
else if(t=="eiffel"){x.strokeStyle="#8b5f2b";x.lineWidth=10;x.beginPath();x.moveTo(-64,20);x.lineTo(0,-190);x.lineTo(64,20);x.stroke();x.lineWidth=5;x.beginPath();x.moveTo(-50,-45);x.lineTo(50,-45);x.moveTo(-58,0);x.lineTo(58,0);x.stroke()}
else if(t=="skyscraper"){R(-45,-180,90,200,"#65b6e3");x.fillStyle="#1f618c";for(let yy=-155;yy<-10;yy+=30)for(let xx of[-28,0,28])x.fillRect(xx-8,yy,16,17)}
else if(t=="airplane"){x.translate(0,-80);x.fillStyle="#e7eef4";x.beginPath();x.ellipse(0,0,90,20,0,0,7);x.fill();x.fillStyle="#58a9e3";x.beginPath();x.moveTo(-8,-4);x.lineTo(-72,-58);x.lineTo(15,-16);x.fill();x.beginPath();x.moveTo(-8,4);x.lineTo(-72,58);x.lineTo(15,16);x.fill();x.fillStyle="#ef5b55";x.beginPath();x.moveTo(54,-10);x.lineTo(88,-38);x.lineTo(67,2);x.fill()}
else{R(-18,-210,36,230,"#b5e2ee");R(-44,-130,28,150,"#8ec9dc");R(16,-156,34,176,"#7dbbd0")}}
function bookCard(cx,cy,w,h,m,un){x.save();x.shadowColor="rgba(0,0,0,.22)";x.shadowBlur=14;x.shadowOffsetY=5;rr(cx-w/2,cy-h/2,w,h,16);x.fillStyle=un?"#fff7dc":"#5e4b32";x.fill();x.restore();picture(cx-w/2+14,cy-h/2+14,w-28,h*.58,m,!un);x.fillStyle=un?"#2f8edb":"#5e5a55";rr(cx-w/2+24,cy-h/2+4,30,58,4);x.fill();x.fillStyle=un?"#ffd44d":"#aaa";x.font="21px serif";x.textAlign="center";x.fillText("★",cx-w/2+39,cy-h/2+30);rr(cx-w/2+16,cy+h/2-58,w-32,44,13);x.fillStyle=un?"rgba(255,255,255,.92)":"rgba(20,18,15,.62)";x.fill();x.textAlign="center";x.fillStyle=un?"#3e2818":"#f0dfb7";x.font="bold 16px sans-serif";x.fillText(un?m.name:"???",cx,cy+h/2-39);x.fillStyle=un?"#245a9f":"#e5c982";x.font="bold 19px sans-serif";x.fillText(un?m.h:"LOCKED",cx,cy+h/2-18)}
function book(){if(S.bookA<.02)return;let a=S.bookA;x.save();x.globalAlpha=a;let g=x.createLinearGradient(0,0,0,H);g.addColorStop(0,"#168ce4");g.addColorStop(.62,"#a9e3ff");g.addColorStop(1,"#f4cf87");x.fillStyle=g;x.fillRect(0,0,W,H);x.restore();
let bw=Math.min(W*.88,900),bh=Math.min(H*.74,600),bx=(W-bw)/2,by=(H-bh)/2+26;x.save();x.globalAlpha=a;x.shadowColor="rgba(0,0,0,.42)";x.shadowBlur=32;x.shadowOffsetY=16;rr(bx-34,by-24,bw+68,bh+52,26);x.fillStyle="#5a3219";x.fill();x.fillStyle="#fff0bd";rr(bx,by,bw,bh,14);x.fill();x.restore();
x.save();x.globalAlpha=a;let sp=x.createLinearGradient(bx+bw*.44,by,bx+bw*.56,by);sp.addColorStop(0,"rgba(80,45,15,0)");sp.addColorStop(.5,"rgba(255,245,180,.95)");sp.addColorStop(1,"rgba(80,45,15,0)");x.fillStyle=sp;x.fillRect(bx+bw*.44,by,bw*.12,bh);x.strokeStyle="rgba(130,85,35,.5)";x.lineWidth=3;x.strokeRect(bx+18,by+18,bw-36,bh-36);x.fillStyle="#5c361d";x.font="bold 30px sans-serif";x.textAlign="center";x.fillText("HEIGHT  BOOK",bx+bw/2,by+58);
let pages=Math.ceil(ms.length/4),un=ms.filter(m=>S.best>=m.b||S.blocks.length>=m.b).length;for(let i=0;i<4;i++){let idx=S.page*4+i;if(idx>=ms.length)continue;let side=i<2?0:1,loc=side?i-2:i,pageX=bx+(side?bw*.5:0);bookCard(pageX+bw*.25,by+bh*.33+loc*bh*.32,bw*.36,bh*.25,ms[idx],idx<un)}
function arr(xx,dir,en){x.globalAlpha=en?a:a*.25;x.beginPath();x.arc(xx,by+bh*.52,29,0,7);x.fillStyle="#2e9fe2";x.fill();x.strokeStyle="#fff";x.lineWidth=6;x.beginPath();if(dir<0){x.moveTo(xx+9,by+bh*.52-13);x.lineTo(xx-9,by+bh*.52);x.lineTo(xx+9,by+bh*.52+13)}else{x.moveTo(xx-9,by+bh*.52-13);x.lineTo(xx+9,by+bh*.52);x.lineTo(xx-9,by+bh*.52+13)}x.stroke();x.globalAlpha=a}arr(bx-30,-1,S.page>0);arr(bx+bw+30,1,S.page<pages-1);
x.beginPath();x.arc(bx+bw+28,by-18,25,0,7);x.fillStyle="#f05b42";x.fill();x.strokeStyle="#ffd36a";x.lineWidth=4;x.stroke();x.strokeStyle="#fff";x.lineWidth=6;x.beginPath();x.moveTo(bx+bw+18,by-28);x.lineTo(bx+bw+38,by-8);x.moveTo(bx+bw+38,by-28);x.lineTo(bx+bw+18,by-8);x.stroke();
if(S.flip>0){let raw=S.flip,dir=S.flipDir,p=1-raw,wave=Math.sin(p*Math.PI),cx=bx+bw*.5,ox=dir>0?bx+bw:bx,edge=dir>0?ox-bw*.5*p:ox+bw*.5*p,curl=cx+dir*bw*.20*wave;x.save();x.globalAlpha=.96*wave;let pg=x.createLinearGradient(edge,by,curl,by);pg.addColorStop(0,"#fff5ca");pg.addColorStop(.55,"#ecd18d");pg.addColorStop(1,"rgba(100,62,20,.42)");x.fillStyle=pg;x.shadowColor="rgba(0,0,0,.42)";x.shadowBlur=26;x.shadowOffsetX=-dir*16;x.beginPath();x.moveTo(ox,by+4);x.bezierCurveTo(edge,by+bh*.08,curl,by+bh*.18,cx,by+10);x.lineTo(cx,by+bh-10);x.bezierCurveTo(curl,by+bh*.82,edge,by+bh*.92,ox,by+bh-4);x.closePath();x.fill();x.restore()}x.restore()}
function render(){update();bg();let sh=iso(0,0,0);x.fillStyle="rgba(0,0,0,.14)";x.beginPath();x.ellipse(sh.x,sh.y+45,150,42,0,0,7);x.fill();for(let b of S.blocks)drawBlock(b);if(S.moving)drawBlock(S.moving);for(let st of S.stars){x.globalAlpha=st.a;x.fillStyle="#ffd84a";x.font=st.s*4+"px serif";x.fillText("★",st.x,st.y)}x.globalAlpha=1;ui();book();requestAnimationFrame(render)}
function hit(px,py){if(S.book){let bw=Math.min(W*.88,900),bh=Math.min(H*.74,600),bx=(W-bw)/2,by=(H-bh)/2+26,pages=Math.ceil(ms.length/4);let dx=px-(bx+bw+28),dy=py-(by-18);if(dx*dx+dy*dy<1600){S.book=false;return}if(S.flip<=0&&px>bx+bw-5&&px<bx+bw+70&&py>by+bh*.4&&py<by+bh*.65&&S.page<pages-1){S.next=S.page+1;S.flip=1;S.flipDir=1;return}if(S.flip<=0&&px>bx-70&&px<bx+5&&py>by+bh*.4&&py<by+bh*.65&&S.page>0){S.next=S.page-1;S.flip=1;S.flipDir=-1;return}return}if(px>22&&px<90&&py>90&&py<158){S.book=true;return}place()}
c.addEventListener("pointerdown",e=>{e.preventDefault();hit(e.clientX,e.clientY)},{passive:false});addEventListener("keydown",e=>{if(e.code==="Space"||e.code==="Enter")place();if(e.code==="KeyB")S.book=!S.book});reset();render();
</script></body></html>

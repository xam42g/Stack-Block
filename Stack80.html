<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"/>
<title>Stack80</title>
<style>
html,body{
  margin:0;height:100%;overflow:hidden;background:#000;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
}
canvas{display:block;width:100vw;height:100vh;touch-action:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(() => {
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d");

  let DPR=1,W=0,H=0,CW=0,CH=0;
  function resize(){
    DPR=Math.max(1,Math.min(2,window.devicePixelRatio||1));
    W=window.innerWidth; H=window.innerHeight;
    CW=Math.floor(W*DPR); CH=Math.floor(H*DPR);
    canvas.width=CW; canvas.height=CH;
  }
  window.addEventListener("resize", resize);
  resize();

  const rand=(a,b)=>a+Math.random()*(b-a);
  const lerp=(a,b,t)=>a+(b-a)*t;
  const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

  const THEMES=[
    {top:"#62C370",left:"#3F9A4E",right:"#2F7B3D",bg1:"#a7d9dd",bg2:"#cde7c6"},
    {top:"#FF6B6B",left:"#D94C4C",right:"#B63D3D",bg1:"#a7d9dd",bg2:"#cde7c6"},
    {top:"#4D96FF",left:"#2F74D6",right:"#225AA8",bg1:"#a7d9dd",bg2:"#cde7c6"},
    {top:"#FFD93D",left:"#D7B428",right:"#B59018",bg1:"#a7d9dd",bg2:"#cde7c6"},
    {top:"#B980F0",left:"#9464C9",right:"#7448A8",bg1:"#a7d9dd",bg2:"#cde7c6"},
    {top:"#FF9F1C",left:"#D78112",right:"#B5660B",bg1:"#a7d9dd",bg2:"#cde7c6"},
    {top:"#2EC4B6",left:"#21998E",right:"#18756E",bg1:"#a7d9dd",bg2:"#cde7c6"},
    {top:"#F7B801",left:"#D09300",right:"#AA7600",bg1:"#a7d9dd",bg2:"#cde7c6"},
    {top:"#F187B0",left:"#C96A90",right:"#A65173",bg1:"#a7d9dd",bg2:"#cde7c6"},
    {top:"#8AC926",left:"#6FA01D",right:"#567C17",bg1:"#a7d9dd",bg2:"#cde7c6"}
  ];

  const STORAGE_KEY="stack80_best";

  function playfield(){
    const h = H*0.84;
    const w = Math.min(h*0.64, W*0.58);
    return {x:(W-w)/2, y:(H-h)/2 + H*0.01, w, h};
  }

  const state = {
    blocks: [],
    mover: null,
    scraps: [],
    particles: [],
    stars: [],
    score: 0,
    heightBlocks: 1,
    milestoneText: "",
    milestoneSub: "",
    milestoneT: 0,
    milestonesShown: {},
    bookOpen: false,
    bookAnim: 0,
    bookPage: 0,
    pageFlip: 0,
    pageFlipDir: 0,
    bookNextPage: 0,
    streak: 0,
    comboFlash: 0,
    comboTextT: 0,
    guidePulse: 0,
    lastGain: 0,
    best: Number(localStorage.getItem(STORAGE_KEY)||0),
    over: false,
    camLift: 0,
    camPanY: 0,
    scale: 1,
    goT: 0,
    goScaleStart: 1,
    goScaleTarget: 1,
    goPanStart: 0,
    goPanTarget: 0
  };

  function saveBest(){
    localStorage.setItem(STORAGE_KEY, String(state.best));
  }

  function themeFor(index){
    return THEMES[index % THEMES.length];
  }

  const MILESTONES = [
    {blocks:5,  name:"House", height:"10 m", type:"house"},
    {blocks:10, name:"Church", height:"30 m", type:"church"},
    {blocks:17, name:"Big Ben", height:"96 m", type:"bigben"},
    {blocks:25, name:"Cologne Cathedral", height:"157 m", type:"cathedral"},
    {blocks:34, name:"Eiffel Tower", height:"330 m", type:"eiffel"},
    {blocks:42, name:"Skyscraper", height:"400 m", type:"skyscraper"},
    {blocks:50, name:"Airplane", height:"500 m", type:"airplane"},
    {blocks:58, name:"Burj Khalifa", height:"828 m", type:"burj"},
    {blocks:66, name:"Everest", height:"8,849 m", type:"mountain"},
    {blocks:74, name:"Rocket", height:"12,000 m", type:"rocket"}
  ];

  function checkMilestone(){
    for(const m of MILESTONES){
      if(state.heightBlocks === m.blocks && !state.milestonesShown[m.blocks]){
        state.milestonesShown[m.blocks] = true;
        state.milestoneText = m.name;
        state.milestoneSub = m.height;
        state.milestoneT = 1;
        break;
      }
    }
  }

  function resetGame(){
    state.blocks = [{x:0,y:0,z:0,w:170,d:170,h:30,theme:0}];
    state.scraps = [];
    state.particles = [];
    state.stars = [];
    state.score = 0;
    state.heightBlocks = 1;
    state.milestoneText = "";
    state.milestoneSub = "";
    state.milestoneT = 0;
    state.milestonesShown = {};
    state.bookOpen = false;
    state.bookAnim = 0;
    state.bookPage = 0;
    state.pageFlip = 0;
    state.pageFlipDir = 0;
    state.bookNextPage = 0;
    state.streak = 0;
    state.comboFlash = 0;
    state.comboTextT = 0;
    state.guidePulse = 0;
    state.lastGain = 0;
    state.over = false;
    state.camLift = 0;
    state.camPanY = 0;
    state.scale = 1;
    state.goT = 0;
    state.goScaleStart = 1;
    state.goScaleTarget = 1;
    state.goPanStart = 0;
    state.goPanTarget = 0;
    spawnMover();
  }

  function spawnMover(){
    const prev = state.blocks[state.blocks.length-1];
    const dir = (state.blocks.length % 2 === 1) ? "x" : "y";
    const span = 250;
    state.mover = {
      dir,
      x: dir==="x" ? -span : prev.x,
      y: dir==="y" ? -span : prev.y,
      z: prev.z + prev.h,
      w: prev.w,
      d: prev.d,
      h: prev.h,
      v: 3.6 + Math.min(4.5, state.score*0.03),
      theme: state.blocks.length
    };
  }

  function projectRaw(x,y,z,lift){
    const r = playfield();
    const cx = r.x + r.w*0.5;
    const groundY = r.y + r.h*0.72 + lift;
    return {
      x: cx + (x-y)*0.86,
      y: groundY + (x+y)*0.50 - z
    };
  }

  function worldToScreen(x,y,z){
    const r = playfield();
    const p = projectRaw(x,y,z,state.camLift);
    const ox = r.x + r.w*0.5;
    const oy = r.y + r.h*0.82 + state.camPanY;
    return {
      x: ox + (p.x-ox)*state.scale,
      y: oy + (p.y-oy)*state.scale
    };
  }

  function blockRawBounds(block, lift){
    const pts = [
      projectRaw(block.x, block.y, block.z, lift),
      projectRaw(block.x+block.w, block.y, block.z, lift),
      projectRaw(block.x+block.w, block.y+block.d, block.z, lift),
      projectRaw(block.x, block.y+block.d, block.z, lift),
      projectRaw(block.x, block.y, block.z+block.h, lift),
      projectRaw(block.x+block.w, block.y, block.z+block.h, lift),
      projectRaw(block.x+block.w, block.y+block.d, block.z+block.h, lift),
      projectRaw(block.x, block.y+block.d, block.z+block.h, lift),
    ];
    let minX=1e9,maxX=-1e9,minY=1e9,maxY=-1e9;
    for(const p of pts){
      minX=Math.min(minX,p.x); maxX=Math.max(maxX,p.x);
      minY=Math.min(minY,p.y); maxY=Math.max(maxY,p.y);
    }
    return {minX,maxX,minY,maxY,w:maxX-minX,h:maxY-minY};
  }

  function towerRawBounds(lift){
    let minX=1e9,maxX=-1e9,minY=1e9,maxY=-1e9;
    for(const b of state.blocks){
      const bb = blockRawBounds(b, lift);
      minX=Math.min(minX,bb.minX); maxX=Math.max(maxX,bb.maxX);
      minY=Math.min(minY,bb.minY); maxY=Math.max(maxY,bb.maxY);
    }
    return {minX,maxX,minY,maxY,w:maxX-minX,h:maxY-minY};
  }

  function computeGameOverTargets(){
    const r = playfield();
    const raw = towerRawBounds(state.camLift);

    const availW = r.w*0.90;
    const availH = r.h*0.84;
    const fitScale = Math.min(availW/raw.w, availH/raw.h, 1);
    const targetScale = clamp(fitScale*0.88, 0.05, 1);

    const rawCenterY = (raw.minY + raw.maxY)*0.5;
    const playCenterY = r.y + r.h*0.54;
    const panTarget = (playCenterY - rawCenterY) * targetScale;

    return {scale: targetScale, panY: panTarget};
  }

  function triggerGameOver(){
    state.over = true;
    state.goT = 0;
    state.goScaleStart = state.scale;
    state.goPanStart = state.camPanY;
    const t = computeGameOverTargets();
    state.goScaleTarget = t.scale;
    state.goPanTarget = t.panY;
    state.best = Math.max(state.best, state.score);
    saveBest();
  }

  function addScrap(piece, positive){
    if(!piece) return;
    state.scraps.push({...piece, vx: positive?1.8:-1.8, vz:0, dead:false});
  }

  function addBurst(x,y,n){
    for(let i=0;i<n;i++){
      state.particles.push({
        x,y,vx:rand(-1.5,1.5),vy:rand(-2.6,-0.6),g:rand(0.07,0.14),
        size:rand(1.3,3.6), life:rand(16,36), max:36
      });
    }
  }

  function addStarBurst(x,y,n){
    for(let i=0;i<n;i++){
      const a = -Math.PI/2 + (Math.random()-0.5)*Math.PI*1.7;
      const sp = 1.8 + Math.random()*3.8;
      state.stars.push({
        x,y,
        vx:Math.cos(a)*sp,
        vy:Math.sin(a)*sp-1.0,
        g:0.055+Math.random()*0.04,
        rot:Math.random()*Math.PI*2,
        vr:(Math.random()-0.5)*0.24,
        size:7+Math.random()*8,
        life:58+Math.random()*18,
        max:76
      });
    }
  }

  function place(){
    if(state.over){ resetGame(); return; }
    if(!state.mover) return;

    const a = state.mover;
    const prev = state.blocks[state.blocks.length-1];
    const perfect = 7;

    let wasPerfect = false;

    if(a.dir==="x"){
      const dx = a.x - prev.x;
      let overlap = prev.w - Math.abs(dx);

      if(Math.abs(dx) <= perfect){
        a.x = prev.x;
        overlap = prev.w;
        wasPerfect = true;
      }

      if(overlap <= 0){
        addScrap({...a}, dx>0);
        triggerGameOver();
        return;
      }

      if(overlap < a.w){
        if(dx > 0){
          addScrap({x:a.x+overlap,y:a.y,z:a.z,w:a.w-overlap,d:a.d,h:a.h,theme:a.theme}, true);
          a.w = overlap;
        } else {
          addScrap({x:a.x,y:a.y,z:a.z,w:a.w-overlap,d:a.d,h:a.h,theme:a.theme}, false);
          a.x = prev.x;
          a.w = overlap;
        }
      }
    } else {
      const dy = a.y - prev.y;
      let overlap = prev.d - Math.abs(dy);

      if(Math.abs(dy) <= perfect){
        a.y = prev.y;
        overlap = prev.d;
        wasPerfect = true;
      }

      if(overlap <= 0){
        addScrap({...a}, dy>0);
        triggerGameOver();
        return;
      }

      if(overlap < a.d){
        if(dy > 0){
          addScrap({x:a.x,y:a.y+overlap,z:a.z,w:a.w,d:a.d-overlap,h:a.h,theme:a.theme}, true);
          a.d = overlap;
        } else {
          addScrap({x:a.x,y:a.y,z:a.z,w:a.w,d:a.d-overlap,h:a.h,theme:a.theme}, false);
          a.y = prev.y;
          a.d = overlap;
        }
      }
    }

    state.blocks.push({x:a.x,y:a.y,z:a.z,w:a.w,d:a.d,h:a.h,theme:a.theme});
    state.heightBlocks = state.blocks.length;
    checkMilestone();

    let gain = 1;
    if(wasPerfect){
      state.streak += 1;
      gain = 2 + Math.max(0, state.streak - 1);
      state.comboFlash = 1;
      state.comboTextT = 1;
      state.comboTextT = 1;
      state.guidePulse = 1;
    } else {
      state.streak = 0;
      state.comboFlash = 0;
      state.comboTextT = 0;
      state.guidePulse = 0;
    }

    state.lastGain = gain;
    state.score += gain;
    state.best = Math.max(state.best, state.score);
    saveBest();

    const burst = worldToScreen(a.x+a.w*0.5, a.y+a.d*0.5, a.z+a.h*0.65);
    addBurst(burst.x, burst.y, wasPerfect ? 26 : 8);
    if(wasPerfect){
      addStarBurst(burst.x, burst.y - 18, 10 + Math.min(18, state.streak*4));
    }
    spawnMover();
  }

  function updateCameraPlaying(){
    const liftStart = 12;
    const liftPer = 28;
    const targetLift = state.blocks.length > liftStart ? (state.blocks.length-liftStart)*liftPer : 0;
    state.camLift = lerp(state.camLift, targetLift, 0.12);
    state.camPanY = lerp(state.camPanY, 0, 0.10);
    state.scale = lerp(state.scale, 1, 0.10);
  }

  function updateCameraGameOver(){
    state.goT = Math.min(1, state.goT + 0.0020);
    const ease = 1 - Math.pow(1 - state.goT, 2.5);
    state.scale = state.goScaleStart + (state.goScaleTarget - state.goScaleStart) * ease;
    state.camPanY = state.goPanStart + (state.goPanTarget - state.goPanStart) * ease;
  }

  function update(){
    if(!state.over) updateCameraPlaying();
    else updateCameraGameOver();

    if(state.mover && !state.over){
      state.mover[state.mover.dir] += state.mover.v;
      if(state.mover[state.mover.dir] > 260 || state.mover[state.mover.dir] < -260) state.mover.v *= -1;
    }

    state.comboFlash = Math.max(0, state.comboFlash - 0.025);

    state.comboFlash = Math.max(0, state.comboFlash - 0.016);
    state.comboTextT = Math.max(0, state.comboTextT - 0.012);
    state.milestoneT = Math.max(0, state.milestoneT - 0.006);
    state.bookAnim = lerp(state.bookAnim, state.bookOpen ? 1 : 0, 0.18);
    if(state.pageFlip > 0){
      state.pageFlip = Math.max(0, state.pageFlip - 0.032);
      if(state.pageFlip < 0.50 && state.bookPage !== state.bookNextPage){
        state.bookPage = state.bookNextPage;
      }
    }
    state.guidePulse = Math.max(0, state.guidePulse - 0.025);

    for(const p of state.particles){
      p.x += p.vx;
      p.y += p.vy;
      p.vy += p.g;
      p.life--;
    }
    state.particles = state.particles.filter(p=>p.life>0);

    for(const st of state.stars){
      st.x += st.vx;
      st.y += st.vy;
      st.vy += st.g;
      st.rot += st.vr;
      st.life--;
    }
    state.stars = state.stars.filter(st=>st.life>0);

    for(const s of state.scraps){
      s.vz += 0.28;
      s.z -= s.vz;
      s.x += s.vx;
      if(s.z < -300) s.dead = true;
    }
    state.scraps = state.scraps.filter(s=>!s.dead);
  }

  function drawBackground(){
    const r = playfield();

    // full sky background (no black borders)
    const skyFull = ctx.createLinearGradient(0,0,0,CH);
    skyFull.addColorStop(0, "#7bcdf5");
    skyFull.addColorStop(0.5, "#c9eadc");
    skyFull.addColorStop(1, "#ffe7ad");
    ctx.fillStyle = skyFull;
    ctx.fillRect(0,0,CW,CH);

    const x=r.x*DPR, y=r.y*DPR, w=r.w*DPR, h=r.h*DPR;

    const sky = ctx.createLinearGradient(0,y,0,y+h);
    sky.addColorStop(0, "#7bcdf5");
    sky.addColorStop(0.50, "#c9eadc");
    sky.addColorStop(1, "#ffe7ad");
    ctx.fillStyle = sky;
    ctx.fillRect(x,y,w,h);

    const sx = x + w*0.20;
    const sy = y + h*0.16;
    const sun = ctx.createRadialGradient(sx,sy,8*DPR,sx,sy,135*DPR);
    sun.addColorStop(0,"rgba(255,255,235,0.72)");
    sun.addColorStop(0.35,"rgba(255,240,170,0.20)");
    sun.addColorStop(1,"rgba(255,240,170,0)");
    ctx.fillStyle = sun;
    ctx.beginPath();
    ctx.arc(sx,sy,140*DPR,0,Math.PI*2);
    ctx.fill();

    for(let i=0;i<22;i++){
      const px=(r.x+((i*101)%1000)/1000*r.w)*DPR;
      const py=(r.y+((i*137+performance.now()*0.01)%1000)/1000*r.h)*DPR;
      const sz=((i%3)+1)*DPR*0.65;
      ctx.globalAlpha=0.16+(i%4)*0.09;
      ctx.fillStyle="#fff";
      ctx.fillRect(px,py,sz,sz);
    }
    ctx.globalAlpha=1;
  }

  function drawBaseShadow(){
    const base = state.blocks[0];
    if(!base) return;

    const center = worldToScreen(base.x + base.w*0.5, base.y + base.d*0.5, base.z - 2);

    const g = ctx.createRadialGradient(
      center.x*DPR, (center.y+34)*DPR, 8*DPR,
      center.x*DPR, (center.y+34)*DPR, 125*DPR
    );
    g.addColorStop(0,"rgba(45,65,75,0.18)");
    g.addColorStop(0.55,"rgba(45,65,75,0.08)");
    g.addColorStop(1,"rgba(45,65,75,0)");

    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.ellipse(center.x*DPR,(center.y+36)*DPR,118*DPR,40*DPR,0,0,Math.PI*2);
    ctx.fill();
  }

  function drawBlock(b, alpha=1){
    const t = themeFor(b.theme);
    const p1 = worldToScreen(b.x,b.y,b.z+b.h);
    const p2 = worldToScreen(b.x+b.w,b.y,b.z+b.h);
    const p3 = worldToScreen(b.x+b.w,b.y+b.d,b.z+b.h);
    const p4 = worldToScreen(b.x,b.y+b.d,b.z+b.h);
    const q1 = worldToScreen(b.x,b.y,b.z);
    const q2 = worldToScreen(b.x+b.w,b.y,b.z);
    const q3 = worldToScreen(b.x+b.w,b.y+b.d,b.z);
    const q4 = worldToScreen(b.x,b.y+b.d,b.z);

    ctx.globalAlpha = alpha;

    ctx.fillStyle = t.left;
    ctx.beginPath();
    ctx.moveTo(p4.x*DPR,p4.y*DPR); ctx.lineTo(p3.x*DPR,p3.y*DPR); ctx.lineTo(q3.x*DPR,q3.y*DPR); ctx.lineTo(q4.x*DPR,q4.y*DPR);
    ctx.closePath(); ctx.fill();

    ctx.fillStyle = t.right;
    ctx.beginPath();
    ctx.moveTo(p2.x*DPR,p2.y*DPR); ctx.lineTo(p3.x*DPR,p3.y*DPR); ctx.lineTo(q3.x*DPR,q3.y*DPR); ctx.lineTo(q2.x*DPR,q2.y*DPR);
    ctx.closePath(); ctx.fill();

    ctx.fillStyle = t.top;
    ctx.beginPath();
    ctx.moveTo(p1.x*DPR,p1.y*DPR); ctx.lineTo(p2.x*DPR,p2.y*DPR); ctx.lineTo(p3.x*DPR,p3.y*DPR); ctx.lineTo(p4.x*DPR,p4.y*DPR);
    ctx.closePath(); ctx.fill();

    ctx.strokeStyle = "rgba(0,0,0,0.18)";
    ctx.lineWidth = 1.5*DPR;
    ctx.beginPath();
    ctx.moveTo(p1.x*DPR,p1.y*DPR); ctx.lineTo(p2.x*DPR,p2.y*DPR); ctx.lineTo(p3.x*DPR,p3.y*DPR); ctx.lineTo(q3.x*DPR,q3.y*DPR); ctx.lineTo(q4.x*DPR,q4.y*DPR); ctx.lineTo(p4.x*DPR,p4.y*DPR); ctx.closePath();
    ctx.stroke();

    ctx.globalAlpha = 1;
  }

  function drawStarParticle(x,y,r,rot,alpha){
    ctx.save();
    ctx.translate(x*DPR,y*DPR);
    ctx.rotate(rot);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = "#ffd84a";
    ctx.strokeStyle = "rgba(255,255,255,0.9)";
    ctx.lineWidth = 1.1*DPR;
    ctx.beginPath();
    for(let i=0;i<10;i++){
      const a = -Math.PI/2 + i*Math.PI/5;
      const rr = (i%2===0 ? r : r*0.44)*DPR;
      const px = Math.cos(a)*rr;
      const py = Math.sin(a)*rr;
      if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    ctx.restore();
    ctx.globalAlpha = 1;
  }

  function drawParticles(){
    for(const p of state.particles){
      const a = Math.max(0,p.life/p.max);
      ctx.globalAlpha = a;
      ctx.fillStyle = "rgba(255,255,255,"+a+")";
      ctx.beginPath();
      ctx.arc(p.x*DPR,p.y*DPR,p.size*DPR,0,Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    for(const st of state.stars){
      const a = Math.max(0, st.life/st.max);
      drawStarParticle(st.x, st.y, st.size, st.rot, a);
    }
  }

  function drawUI(){
    const r = playfield();

    function roundRect(x,y,w,h,rad){
      ctx.beginPath();
      ctx.moveTo(x+rad,y);
      ctx.arcTo(x+w,y,x+w,y+h,rad);
      ctx.arcTo(x+w,y+h,x,y+h,rad);
      ctx.arcTo(x,y+h,x,y,rad);
      ctx.arcTo(x,y,x+w,y,rad);
      ctx.closePath();
    }

    function drawSmallCard(x,y,w,h,label,value){
      const rad = h*0.40;
      ctx.save();

    function drawMiniCrown(cx,cy,s){
      ctx.save();
      ctx.translate(cx,cy);
      ctx.fillStyle="#f3c63b";
      ctx.beginPath();
      ctx.moveTo(-8*s,5*s);
      ctx.lineTo(-8*s,9*s);
      ctx.lineTo(8*s,9*s);
      ctx.lineTo(8*s,5*s);
      ctx.lineTo(4*s,5*s);
      ctx.lineTo(2*s,-5*s);
      ctx.lineTo(0,1*s);
      ctx.lineTo(-2*s,-5*s);
      ctx.lineTo(-4*s,5*s);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function drawMiniStar(cx,cy,s){
      ctx.save();
      ctx.translate(cx,cy);
      ctx.fillStyle="#f3c63b";
      ctx.beginPath();
      for(let i=0;i<10;i++){
        const a=-Math.PI/2+i*Math.PI/5;
        const rr=(i%2===0?7*s:3*s);
        const px=Math.cos(a)*rr;
        const py=Math.sin(a)*rr;
        if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    const cardH = Math.max(42*DPR, r.h*0.055*DPR);
    const sideW = r.w*0.18*DPR;
    const midW = r.w*0.22*DPR;
    const topY = Math.max(8*DPR, (r.y - cardH - 10)*DPR);

    const leftX = (r.x + r.w*0.05)*DPR;
    const midX = (r.x + r.w*0.5)*DPR - midW*0.5;
    const rightX = (r.x + r.w*0.77)*DPR;

    drawSmallCard(leftX, topY, sideW, cardH, "BEST", state.best);
    drawSmallCard(midX, topY, midW, cardH, "COMBO", state.streak>0 ? state.streak : 0);
    drawSmallCard(rightX, topY, sideW, cardH, "SCORE", state.score);

    drawMiniCrown(leftX + sideW*0.5, topY - 2*DPR, 0.85*DPR);
    drawMiniStar(rightX + sideW*0.5, topY - 2*DPR, 0.85*DPR);

    if(state.comboTextT > 0 && state.streak > 0){
      ctx.globalAlpha = Math.min(1, state.comboTextT*1.5);
      ctx.fillStyle = "#ff8d1f";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = Math.round(r.w*0.034*DPR)+'px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif';
      ctx.fillText("PERFECT COMBO", (r.x+r.w*0.5)*DPR, (topY+cardH+18*DPR));
      ctx.globalAlpha = 1;
    }

    if(state.milestoneT > 0){
      const a = Math.min(1, state.milestoneT * 2.4);
      const boxW = r.w * 0.50 * DPR;
      const boxH = r.h * 0.050 * DPR;
      const boxX = (r.x + r.w*0.25) * DPR;
      const boxY = Math.max(8*DPR, topY + cardH + 12*DPR);
      const rad = boxH*0.40;

      ctx.save();
      ctx.globalAlpha = a;
      ctx.shadowColor = "rgba(0,0,0,0.22)";
      ctx.shadowBlur = 12*DPR;
      ctx.shadowOffsetY = 5*DPR;
      roundRect(boxX, boxY, boxW, boxH, rad);
      ctx.fillStyle = "rgba(255,255,255,0.97)";
      ctx.fill();
      ctx.restore();

      ctx.globalAlpha = a;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = "#13243a";
      ctx.font = Math.round(r.w*0.032*DPR)+'px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif';
      ctx.fillText(state.milestoneText + " · " + state.milestoneSub, boxX + boxW*0.5, boxY + boxH*0.52);
      ctx.globalAlpha = 1;
    }
  }

    ctx.save(); ctx.globalAlpha=.60*a; ctx.fillStyle="#071018"; ctx.fillRect(0,0,CW,CH); ctx.restore();

    const bw=Math.min(W*.88,860)*DPR, bh=Math.min(H*.72,560)*DPR;
    const bx=(W*DPR-bw)/2, by=(H*DPR-bh)/2+12*DPR;

    ctx.save(); ctx.globalAlpha=a; ctx.shadowColor="rgba(0,0,0,.42)"; ctx.shadowBlur=28*DPR; ctx.shadowOffsetY=12*DPR;
    const cover=ctx.createLinearGradient(bx,by,bx,by+bh);
    cover.addColorStop(0,"#b57f2d"); cover.addColorStop(.52,"#d6a64c"); cover.addColorStop(1,"#865b22");
    rr(bx-18*DPR,by-18*DPR,bw+36*DPR,bh+36*DPR,20*DPR); ctx.fillStyle=cover; ctx.fill();
    const paper=ctx.createLinearGradient(bx,by,bx+bw,by+bh);
    paper.addColorStop(0,"#fff4c9"); paper.addColorStop(.5,"#f5e3ad"); paper.addColorStop(1,"#fff0c4");
    ctx.fillStyle=paper; ctx.fillRect(bx,by,bw,bh); ctx.restore();

    ctx.save(); ctx.globalAlpha=a;
    const spine=ctx.createLinearGradient(bx+bw*.46,by,bx+bw*.54,by);
    spine.addColorStop(0,"rgba(120,80,25,0)"); spine.addColorStop(.5,"rgba(255,246,180,.9)"); spine.addColorStop(1,"rgba(120,80,25,0)");
    ctx.fillStyle=spine; ctx.fillRect(bx+bw*.44,by,bw*.12,bh);
    ctx.strokeStyle="rgba(140,95,30,.55)"; ctx.lineWidth=3*DPR; ctx.strokeRect(bx+14*DPR,by+14*DPR,bw-28*DPR,bh-28*DPR);
    drawBookOrnament(bx+42*DPR,by+42*DPR,false); drawBookOrnament(bx+bw-42*DPR,by+42*DPR,true);
    drawBookOrnament(bx+42*DPR,by+bh-42*DPR,false); drawBookOrnament(bx+bw-42*DPR,by+bh-42*DPR,true);

    // close
    ctx.beginPath(); ctx.arc(bx+bw+26*DPR,by-16*DPR,24*DPR,0,Math.PI*2);
    ctx.fillStyle="#ffd65b"; ctx.fill(); ctx.strokeStyle="#a66b1d"; ctx.stroke();
    ctx.strokeStyle="#c93333"; ctx.lineWidth=6*DPR; ctx.beginPath();
    ctx.moveTo(bx+bw+16*DPR,by-26*DPR); ctx.lineTo(bx+bw+36*DPR,by-6*DPR);
    ctx.moveTo(bx+bw+36*DPR,by-26*DPR); ctx.lineTo(bx+bw+16*DPR,by-6*DPR); ctx.stroke();

    ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillStyle="#6d5224";
    ctx.font=20*DPR+'px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif';
    ctx.fillText("HEIGHT BOOK",bx+bw*.5,by+35*DPR);

    // page arrows
    const pages=Math.ceil(MILESTONES.length/6);
    ctx.fillStyle=state.bookPage>0?"rgba(109,82,36,.80)":"rgba(109,82,36,.20)";
    ctx.font=34*DPR+'px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif';
    ctx.fillText("‹",bx+36*DPR,by+bh*.52);
    ctx.fillStyle=state.bookPage<pages-1?"rgba(109,82,36,.80)":"rgba(109,82,36,.20)";
    ctx.fillText("›",bx+bw-36*DPR,by+bh*.52);

    const start=state.bookPage*6, unlocked=unlockedForBook();
    for(let i=0;i<6;i++){
      const idx=start+i;
      if(idx>=MILESTONES.length) continue;
      const m=MILESTONES[idx];
      const side=i<3?0:1, local=side?i-3:i;
      const pageX=bx+(side?bw*.5:0);
      const cx=pageX+bw*.25;
      const cy=by+bh*.24+local*bh*.25;
      drawBookCard(cx,cy,bw*.23,bh*.19,m,idx,idx<unlocked);
    }

    // improved page-turn animation: clear folding sheet with moving crease
    if(state.pageFlip>0){
      const raw = state.pageFlip;
      const dir = state.pageFlipDir || 1;
      const p = 1 - raw; // 0 -> 1 during flip
      const halfW = bw * 0.5;
      const foldW = halfW * (0.12 + Math.sin(p*Math.PI)*0.82);
      const centerX = bx + bw*0.5;

      ctx.save();
      ctx.globalAlpha = 0.78 * Math.sin(p*Math.PI);
      ctx.shadowColor = "rgba(0,0,0,0.30)";
      ctx.shadowBlur = 20*DPR;
      ctx.shadowOffsetX = -dir * 12*DPR;

      const grad = ctx.createLinearGradient(centerX, by, centerX + dir*foldW, by);
      grad.addColorStop(0, "rgba(255,249,213,0.98)");
      grad.addColorStop(0.50, "rgba(232,202,127,0.92)");
      grad.addColorStop(1, "rgba(132,88,30,0.45)");
      ctx.fillStyle = grad;

      ctx.beginPath();
      ctx.moveTo(centerX, by + 4*DPR);
      ctx.quadraticCurveTo(centerX + dir*foldW*0.55, by + bh*0.08, centerX + dir*foldW, by + 28*DPR);
      ctx.lineTo(centerX + dir*foldW, by + bh - 28*DPR);
      ctx.quadraticCurveTo(centerX + dir*foldW*0.55, by + bh*0.92, centerX, by + bh - 4*DPR);
      ctx.closePath();
      ctx.fill();

      ctx.globalAlpha = 0.55 * Math.sin(p*Math.PI);
      ctx.strokeStyle = "rgba(107,74,28,0.55)";
      ctx.lineWidth = 2*DPR;
      ctx.beginPath();
      ctx.moveTo(centerX + dir*foldW*0.92, by + 34*DPR);
      ctx.lineTo(centerX + dir*foldW*0.92, by + bh - 34*DPR);
      ctx.stroke();
      ctx.restore();
    }

    ctx.fillStyle="rgba(80,55,20,.75)";
    ctx.font=12*DPR+'px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif';
    ctx.fillText(String(state.bookPage*2+1),bx+bw*.25,by+bh-18*DPR);
    ctx.fillText(String(state.bookPage*2+2),bx+bw*.75,by+bh-18*DPR);

    ctx.restore();
  }

  function bookOverlayHit(px,py){
    if(!state.bookOpen) return false;
    const bw=Math.min(W*.88,860), bh=Math.min(H*.72,560), bx=(W-bw)/2, by=(H-bh)/2+12;
    const closeX=bx+bw+26, closeY=by-16, dx=px-closeX, dy=py-closeY;
    if(dx*dx+dy*dy<=38*38){ state.bookOpen=false; return true; }

    const pages=Math.ceil(MILESTONES.length/6);
    if(px>=bx+bw-76 && px<=bx+bw-10 && py>=by+bh*.35 && py<=by+bh*.68 && state.bookPage<pages-1 && state.pageFlip<=0){
      state.bookNextPage = state.bookPage + 1;
      state.pageFlip=1; state.pageFlipDir=1; return true;
    }
    if(px>=bx+10 && px<=bx+76 && py>=by+bh*.35 && py<=by+bh*.68 && state.bookPage>0 && state.pageFlip<=0){
      state.bookNextPage = state.bookPage - 1;
      state.pageFlip=1; state.pageFlipDir=-1; return true;
    }
    return px>=bx-30 && px<=bx+bw+60 && py>=by-60 && py<=by+bh+35;
  }


function render(){
    drawBackground();
    const r = playfield();
    ctx.save();
    ctx.beginPath();
    ctx.rect(r.x*DPR,r.y*DPR,r.w*DPR,r.h*DPR);
    ctx.clip();

    drawBaseShadow();
    for(const b of state.blocks) drawBlock(b,1);
    for(const s of state.scraps) drawBlock(s,0.92);

    if(state.mover && !state.over){
      const prev = state.blocks[state.blocks.length-1];
      const guideAlpha = 0.10 + state.guidePulse * 0.16;
      ctx.globalAlpha = guideAlpha;
      ctx.strokeStyle = "rgba(255,255,255,0.95)";
      ctx.lineWidth = 2 * DPR;
      if(state.mover.dir === "x"){
        const g1 = worldToScreen(prev.x, prev.y, state.mover.z + state.mover.h*0.52);
        const g2 = worldToScreen(prev.x + prev.w, prev.y, state.mover.z + state.mover.h*0.52);
        ctx.beginPath();
        ctx.moveTo(g1.x*DPR, g1.y*DPR);
        ctx.lineTo(g2.x*DPR, g2.y*DPR);
        ctx.stroke();
      } else {
        const g1 = worldToScreen(prev.x, prev.y, state.mover.z + state.mover.h*0.52);
        const g2 = worldToScreen(prev.x, prev.y + prev.d, state.mover.z + state.mover.h*0.52);
        ctx.beginPath();
        ctx.moveTo(g1.x*DPR, g1.y*DPR);
        ctx.lineTo(g2.x*DPR, g2.y*DPR);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
      drawBlock(state.mover,1);
    }
    drawParticles();

    ctx.restore();
    drawUI();
    drawBookButton();
    drawBookOverlay();
  }

  function tick(){ update(); render(); requestAnimationFrame(tick); }
  function interact(e){
    if(e) e.preventDefault();
    const px = e ? e.clientX : W*0.5;
    const py = e ? e.clientY : H*0.5;

    if(state.bookOpen){
      bookOverlayHit(px,py);
      return;
    }

    if(bookHit(px,py)){
      state.bookOpen = true;
      return;
    }

    place();
  }

  canvas.addEventListener("pointerdown", interact, {passive:false});

  window.addEventListener("keydown", e => {
    if(e.code==="Space"||e.code==="Enter"){ e.preventDefault(); place(); }
    if(e.code==="KeyB"){ e.preventDefault(); state.bookOpen = !state.bookOpen; }
  });

  resetGame();
  tick();
})();
</script>
</body>
</html>
